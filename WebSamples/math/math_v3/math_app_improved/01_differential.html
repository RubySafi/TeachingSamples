<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <title>微分公式トレーニング V2</title>
    <link rel="stylesheet" href="css/style.css" />
    <!-- MathJax: LaTeX数式レンダリング -->
    <script>
      MathJax = {
        tex: {
          inlineMath: [['$', '$'], ['\\(', '\\)']],
          displayMath: [['$$', '$$'], ['\\[', '\\]']],
        },
        options: {
          skipHtmlTags: ['script', 'noscript', 'style', 'textarea', 'pre']
        }
      };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
  </head>
  <body>
    <div id="app">
      <h1>微分公式トレーニング</h1>

      <section id="menu-screen">
        <button id="btn-time-attack">① 5分間タイムアタックモード</button>
        <button id="btn-standard">② 標準モード (5秒制限)</button>
      </section>

      <section id="quiz-screen" style="display: none">
        <div id="quiz-header">
          <button id="btn-quit">中断してメニューへ</button>
          <div id="timer-display">残り時間: --</div>
        </div>
        <div id="question-text"></div>
        <div id="choices-container"></div>
        <div id="feedback-text"></div>
        <button id="btn-finish" style="display: none">
          学習を終了して結果を見る
        </button>
      </section>

      <section id="result-screen" style="display: none">
        <h2>リザルト</h2>
        <div id="result-summary"></div>
        <div id="result-stats"></div>
        <table id="error-report">
          <thead>
            <tr>
              <th>問題</th>
              <th>正解率</th>
              <th>(正解/回答)</th>
            </tr>
          </thead>
          <tbody id="error-report-body"></tbody>
        </table>
        <button id="btn-restart">メニューに戻る</button>
      </section>
    </div>

    <dialog id="quit-confirm-dialog">
      <p>メニューに戻りますか？<br />（これまでの記録は破棄されます）</p>
      <div class="dialog-buttons">
        <button id="dialog-yes">戻る</button>
        <button id="dialog-no">キャンセル</button>
      </div>
    </dialog>

    <script type="module" src="dist/main.js"></script>
  </body>
</html>
